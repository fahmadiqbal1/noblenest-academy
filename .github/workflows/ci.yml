name: CI

# Phase 11 — PR + push validation pipeline.
# Laravel app lives at noblenest-academy/ (outer repo root contains .github/).
# Baseline to protect: 290 passed / 0 failed / 4 skipped, phpstan exit 0.
#
# a11y (axe WCAG 2.1 AA) + Lighthouse now run on every push/PR via the
# `a11y-lighthouse` job (seeded sqlite app served by `php artisan serve`,
# Chrome via browser-actions/setup-chrome). Dusk browser + schema-squash
# remain deferred — see docs/AUDIT.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: noblenest-academy

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, bcmath, gd, intl, mbstring, zip, imagick, pcntl
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v4
        with:
          path: noblenest-academy/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('noblenest-academy/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-progress --prefer-dist --no-interaction
      - run: vendor/bin/pint --test

  phpstan:
    name: PHPStan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, bcmath, gd, intl, mbstring, zip, imagick, pcntl
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v4
        with:
          path: noblenest-academy/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('noblenest-academy/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-progress --prefer-dist --no-interaction
      - run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

  unit-feature:
    name: Unit + Feature (mysql + redis)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: noblenest_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, bcmath, gd, intl, mbstring, zip, imagick, pcntl
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v4
        with:
          path: noblenest-academy/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('noblenest-academy/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-progress --prefer-dist --no-interaction
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: noblenest-academy/package-lock.json
      - name: Build frontend assets (Vite manifest for view tests)
        run: npm ci && npm run build
      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=mysql|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=noblenest_test|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=root|' .env
      - name: Migrate + seed (MySQL schema validation)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: noblenest_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate:fresh --seed --force
      - name: "Run tests (sqlite in-memory per phpunit.xml)"
        run: php artisan test --without-tty

  audit:
    name: Security audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: noblenest-academy/package-lock.json
      - run: composer install --no-progress --prefer-dist --no-interaction
        # --abandoned=ignore: a transitive dev-only dep (azjezz/psl, pulled
        # by the static-analysis tooling) is abandoned but has no advisory.
        # We still fail on real vulnerabilities.
      - run: composer audit --no-interaction --abandoned=ignore
      - run: npm ci
      - name: npm audit (high + critical fail)
        run: npm audit --omit=dev --audit-level=high

  i18n-gate:
    name: i18n string gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/i18n-string-gate.sh --strict

  a11y-lighthouse:
    name: Accessibility + Lighthouse
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: noblenest_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, bcmath, gd, intl, mbstring, zip, imagick, pcntl
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v4
        with:
          path: noblenest-academy/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('noblenest-academy/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-progress --prefer-dist --no-interaction
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: noblenest-academy/package-lock.json
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - run: npm ci
      - run: npm run build
      - name: Prepare app (mysql + seeded demo)
        run: |
          cp .env.example .env
          sed -i 's|^APP_ENV=.*|APP_ENV=local|' .env
          sed -i 's|^APP_DEBUG=.*|APP_DEBUG=false|' .env
          sed -i 's|^APP_URL=.*|APP_URL=http://localhost:8000|' .env
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=mysql|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=noblenest_test|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=root|' .env
          php artisan key:generate --force
          php artisan migrate:fresh --seed --force
      - name: Serve + axe + Lighthouse (single step — serve must outlive the run)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -e
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/serve.log 2>&1 &
          SERVE_PID=$!
          trap 'kill $SERVE_PID 2>/dev/null || true' EXIT
          # Probe the homepage (200), NOT /health — /health treats Redis +
          # config-cache as CRITICAL and 503s in this lightweight CI context
          # even though the app serves fine.
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:8000/; then
              echo "App up after ${i}s"; UP=1; break
            fi
            sleep 1
          done
          if [ -z "${UP:-}" ]; then
            echo "App failed to boot. serve.log:"; cat /tmp/serve.log
            curl -sS http://localhost:8000/ | head -30 || true
            exit 1
          fi
          npm run a11y
          npm run lighthouse
