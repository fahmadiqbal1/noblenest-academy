name: CI

on:
  pull_request:
    branches: [feature/lms-scaffold]
  push:
    branches: [feature/lms-scaffold]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP — lint + tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: noblenest-academy
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, intl, gd, sqlite, pdo_sqlite, redis
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: noblenest-academy/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('noblenest-academy/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: php -l on app/, config/, database/, routes/, tests/
        run: |
          find app config database routes tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /tmp/lint.log 2>&1 || (cat /tmp/lint.log; exit 1)

      - name: Pint (style — soft-gate)
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: PHPStan (level 6 — soft-gate)
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            ./vendor/bin/phpstan analyse --memory-limit=1G
          else
            echo "(no phpstan config — skipping)"
          fi
        continue-on-error: true

      - name: Generate APP_KEY
        run: |
          cp .env.testing .env
          php artisan key:generate --force

      - name: Run gated test files (Phase 1+2+4 known-passing)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: |
          php artisan test \
            tests/Unit/Services/ActivityRendererResolverTest.php \
            tests/Feature/ActivityRendererTest.php \
            tests/Feature/ActivityCoverageTest.php \
            tests/Feature/StripeWebhookTest.php

  frontend:
    name: Frontend — Vite build
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    defaults:
      run:
        working-directory: noblenest-academy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: noblenest-academy/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Fetch fonts (best-effort)
        run: npm run fonts || echo "(font fetch optional in CI — continuing)"

      - name: Build (Vite)
        run: npm run build

      - name: Verify build output exists
        run: |
          test -d public/build || { echo "Vite build did not produce public/build"; exit 1; }
          ls -lah public/build/assets | head -5
