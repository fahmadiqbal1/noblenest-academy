name: Deploy

# Phase 11 — production deploy → Hostinger KVM4 (Ubuntu 24.04, nginx + php8.3-fpm).
#
# Required GitHub Secrets:
#   DEPLOY_SSH_KEY  — private key (PEM) authorized on the VPS deploy user
#   DEPLOY_SSH_HOST — VPS hostname or IP
#   DEPLOY_SSH_USER — VPS SSH user (e.g. deploy)
#   DEPLOY_PATH     — base path on VPS (e.g. /home/noblenestacademy.com)
#   HEALTH_TOKEN    — bearer token for /health/detailed
#
# This workflow MUST NOT trigger from any branch other than main.

# Manual-only: production deploy is an explicit, operator-initiated action
# (requires the DEPLOY_SSH_* + HEALTH_TOKEN repo secrets). It does NOT run
# on push — that would red-X every commit until secrets exist and risks an
# unintended deploy onto the shared CyberPanel host.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + bundle only, skip scp/ssh/smoke'
        required: false
        default: 'true'

concurrency:
  group: deploy-production
  cancel-in-progress: false

defaults:
  run:
    working-directory: noblenest-academy

jobs:
  deploy:
    name: Deploy → Hostinger KVM4
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, bcmath, gd, intl, mbstring, zip, imagick, pcntl
          coverage: none
          tools: composer:v2

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: noblenest-academy/package-lock.json

      - name: Composer install (no-dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress --no-interaction

      - name: npm ci + build
        run: |
          npm ci
          npm run build

      - name: Bundle release artifact
        run: |
          tar -czf release-${GITHUB_SHA}.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=tests \
            --exclude=storage/logs \
            .
          ls -lh release-${GITHUB_SHA}.tar.gz

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: noblenest-academy/release-${{ github.sha }}.tar.gz
          retention-days: 7

      - name: Stop early if dry-run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry-run requested — skipping scp/ssh/smoke."
          exit 0

      - name: Configure SSH
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: SCP artifact to VPS
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        run: |
          REMOTE_DIR="${{ secrets.DEPLOY_PATH }}/releases/${GITHUB_RUN_ID}"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "mkdir -p $REMOTE_DIR"
          scp -i ~/.ssh/deploy_key release-${GITHUB_SHA}.tar.gz \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:$REMOTE_DIR/"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "cd $REMOTE_DIR && tar -xzf release-${GITHUB_SHA}.tar.gz && rm release-${GITHUB_SHA}.tar.gz"

      - name: Run deploy.sh on VPS
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        id: remote_deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "bash ${{ secrets.DEPLOY_PATH }}/releases/${GITHUB_RUN_ID}/scripts/deploy.sh ${GITHUB_RUN_ID}"

      - name: Smoke test
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        id: smoke
        env:
          HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}
        run: |
          curl -fsS https://www.noblenestacademy.com/health
          curl -fsS -H "Authorization: Bearer $HEALTH_TOKEN" https://www.noblenestacademy.com/health/detailed

      - name: Rollback on failure
        if: failure() && (github.event_name == 'push' || github.event.inputs.dry_run != 'true')
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "bash ${{ secrets.DEPLOY_PATH }}/current/scripts/rollback.sh"
