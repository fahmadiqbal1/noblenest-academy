version: '3.9'

services:
  # PHP-FPM + Nginx + Supervisor
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noblenest-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-noblenest}
      - DB_USERNAME=${DB_USERNAME:-noblenest}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
    ports:
      - "${APP_PORT:-8000}:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./storage/logs:/var/log/supervisor
    networks:
      - noblenest
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MySQL 8 Database
  db:
    image: mysql:8.0-alpine
    container_name: noblenest-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-noblenest}
      MYSQL_USER: ${DB_USERNAME:-noblenest}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./.docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - noblenest
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME:-noblenest}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: noblenest-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - noblenest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Mailhog for email testing (development only)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: noblenest-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - noblenest
    profiles:
      - dev

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  noblenest:
    driver: bridge
