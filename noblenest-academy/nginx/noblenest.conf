# =============================================================
# Noble Nest Academy — Nginx Server Config
# Copy to: /etc/nginx/sites-available/noblenest
# Then run: ln -s /etc/nginx/sites-available/noblenest /etc/nginx/sites-enabled/noblenest
# Replace "yourdomain.com" with your actual domain before using.
# =============================================================

# Rate limiting zones (defined outside server block)
limit_req_zone $binary_remote_addr zone=login:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=global:20m rate=60r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/noblenest/public;
    index index.php;

    # ------- SSL (Certbot fills these in automatically) --------
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ------- Gzip compression -----------------------------------
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  5;
    gzip_min_length  1024;
    gzip_types       text/plain text/css text/xml text/javascript
                     application/javascript application/json application/xml
                     application/rss+xml image/svg+xml font/woff2;

    # ------- Static asset caching (Vite build output) -----------
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ------- Rate-limited routes --------------------------------
    location = /login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }
    location /api/ {
        limit_req zone=api burst=15 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ------- Main PHP routing -----------------------------------
    location / {
        limit_req zone=global burst=200 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ------- Security headers -----------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ------- Logging --------------------------------------------
    access_log /var/log/nginx/noblenest-access.log;
    error_log  /var/log/nginx/noblenest-error.log warn;
}
